<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cinematic-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#0a0a0a" />
  <rect width="100%" height="100%" style="mix-blend-mode: overlay;" filter="url(#grain)" opacity="0.15" />

  <g font-family="'Inter', sans-serif" font-weight="300" font-size="42" letter-spacing="12" text-anchor="middle">
    <text x="50%" y="55%" fill="#00E5FF" filter="url(#cinematic-glow)">
      MINDMESH PRESENTS
      <animate attributeName="opacity" values="0.7; 1; 0.7" dur="4s" repeatCount="indefinite"/>
    </text>
    <text x="50%" y="55%" fill="#FFFFFF">MINDMESH PRESENTS</text>
  </g>
</svg>
