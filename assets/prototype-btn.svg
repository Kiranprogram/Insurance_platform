<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 140" width="100%" height="140">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#00F7FF" stroke-width="0.5" opacity="0.15"/>
    </pattern>

    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F7FF" stop-opacity="0" />
      <stop offset="50%" stop-color="#00F7FF" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00F7FF" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#080c17" />
      <stop offset="100%" stop-color="#02040a" />
    </linearGradient>
  </defs>

  <polygon points="30,10 570,10 590,30 590,130 30,130 10,110 10,30" 
           fill="url(#bgGrad)" stroke="#00F7FF" stroke-width="1" opacity="0.9"/>
  
  <polygon points="30,10 570,10 590,30 590,130 30,130 10,110 10,30" 
           fill="url(#grid)" />

  <g clip-path="url(#buttonClip)">
    <clipPath id="buttonClip">
      <polygon points="30,10 570,10 590,30 590,130 30,130 10,110 10,30" />
    </clipPath>
    <rect x="-150" y="0" width="150" height="140" fill="url(#scanGrad)" transform="skewX(-20)">
      <animate attributeName="x" from="-200" to="700" dur="3s" repeatCount="indefinite" />
    </rect>
  </g>

  <polygon points="25,5 575,5 595,25 595,135 25,135 5,115 5,25" 
           fill="none" stroke="#00F7FF" stroke-width="1.5" stroke-dasharray="15 10 5 10" opacity="0.6">
     <animate attributeName="stroke-dashoffset" from="100" to="0" dur="3s" repeatCount="indefinite" />
  </polygon>

  <path d="M 5,25 L 25,5 L 120,5" fill="none" stroke="#00FF9F" stroke-width="3" filter="url(#glow)" />
  <path d="M 595,115 L 575,135 L 480,135" fill="none" stroke="#00FF9F" stroke-width="3" filter="url(#glow)" />

  <text x="300" y="65" font-family="Courier New, monospace" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="4" filter="url(#glow)">
    INITIALIZE PROTOTYPE
  </text>
  
  <text x="300" y="95" font-family="Courier New, monospace" font-size="14" fill="#00F7FF" text-anchor="middle" letter-spacing="6" opacity="0.9">
    GIGSHIELD_CORE // VERCEL
  </text>

  <text x="25" y="125" font-family="Courier New, monospace" font-size="10" fill="#00FF9F" opacity="0.8">
    [ STATUS: PARAMETRIC_ENGINE_ONLINE ]
  </text>

  <text x="415" y="22" font-family="Courier New, monospace" font-size="10" fill="#00FF9F" opacity="0.8">
    LOC: 12.9716° N, 77.5946° E
  </text>
  
  <circle cx="20" cy="70" r="3" fill="#FF00FF" filter="url(#glow)">
     <animate attributeName="opacity" values="0;1;0" dur="1.2s" repeatCount="indefinite" />
  </circle>
  <circle cx="20" cy="85" r="3" fill="#00F7FF" filter="url(#glow)">
     <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite" />
  </circle>
  <circle cx="20" cy="100" r="3" fill="#00FF9F" filter="url(#glow)">
     <animate attributeName="opacity" values="0;1;0" dur="0.8s" repeatCount="indefinite" />
  </circle>
</svg>
