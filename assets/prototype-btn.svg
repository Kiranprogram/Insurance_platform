<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 90" width="100%" height="100%">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="15" height="15" patternUnits="userSpaceOnUse">
      <path d="M 15 0 L 0 0 0 15" fill="none" stroke="#00F7FF" stroke-width="0.5" opacity="0.15"/>
    </pattern>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F7FF" stop-opacity="0" />
      <stop offset="50%" stop-color="#00F7FF" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#00F7FF" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#080c17" />
      <stop offset="100%" stop-color="#02040a" />
    </linearGradient>
  </defs>

  <polygon points="20,5 380,5 395,20 395,85 20,85 5,70 5,20" 
           fill="url(#bgGrad)" stroke="#00F7FF" stroke-width="1.5"/>
  <polygon points="20,5 380,5 395,20 395,85 20,85 5,70 5,20" fill="url(#grid)" />

  <g clip-path="url(#btnClip)">
    <clipPath id="btnClip">
      <polygon points="20,5 380,5 395,20 395,85 20,85 5,70 5,20" />
    </clipPath>
    <rect x="-100" y="0" width="100" height="90" fill="url(#scanGrad)" transform="skewX(-20)">
      <animate attributeName="x" from="-150" to="500" dur="2.5s" repeatCount="indefinite" />
    </rect>
  </g>

  <polygon points="17,3 382,3 397,18 397,87 17,87 3,73 3,18" 
           fill="none" stroke="#00FF9F" stroke-width="1.5" stroke-dasharray="10 8" opacity="0.5">
     <animate attributeName="stroke-dashoffset" from="36" to="0" dur="2s" repeatCount="indefinite" />
  </polygon>

  <text x="200" y="48" font-family="Courier New, monospace" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2" filter="url(#glow)">
    ▶ LIVE PROTOTYPE
  </text>
  
  <text x="200" y="72" font-family="Courier New, monospace" font-size="12" fill="#00F7FF" text-anchor="middle" letter-spacing="5" opacity="0.9">
    GIGSHIELD // VERCEL
  </text>

  <circle cx="28" cy="45" r="4" fill="#FF00FF" filter="url(#glow)">
     <animate attributeName="opacity" values="0.2;1;0.2" dur="1s" repeatCount="indefinite" />
  </circle>
</svg>
